<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <title>LOGIN-HAVYCODE</title>
  </head>
  <body>
    <section class="card-login">
      <div class="login">
        <div class="logo"><span class="destaque">● HAVYCODE</span></div>

        <h1 id="bemvindo">Bem-vindo de volta</h1>
        <h3 id="subtitulo">Acesse o painel de controle</h3>

        <div>
          <label for="email">EMAIL</label>
          <input type="email" id="email" name="email" placeholder="admin@havycode.com"/>
        </div>

        <div>
          <label for="senha" id="senha">SENHA</label>
          <input type="password" name="senha" placeholder="••••••••" />
        </div>

        <button class="btn-entrar" onclick="handleLogin()">Entrar</button>

        <div class="dados-login">
          <p id="dados-fic">
            admin@havycode.com / admin123 <br />
            user@havycode.com / user456
          </p>
        </div>
      </div>

      <footer>
        <p>© 2026 HAVYCODE. Todos os direitos reservados.</p>
      </footer>
    </section>
  </body>
</html>
